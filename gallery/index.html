<!DOCTYPE html>
<html lang="en">
<head>
    <div class="loader-wrap">
  <div class="threads-loader">
    <span></span>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHOTO GALLERY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <canvas id="embers"></canvas>

  <div class="grain"></div>

  <header class="hero">
    <nav class="topnav">
      <span class="nav-tag">Best. moments</span>
    </nav>

    <div class="hero-center">
      <p class="hero-eyebrow">a collection of light, held still</p>
      <h1 class="hero-title">
        <span class="line" data-text="CHASING">PHOTO</span>
        <span class="line accent" data-text="THE GLOW">GALLERY</span>
      </h1>
      
    </div>

    <div class="scroll-cue">
      <span>scroll</span>
      <div class="scroll-line"><div class="scroll-dot"></div></div>
    </div>
  </header>

  <main>
    

   <section class="gallery" id="gallery">
  <div class="gallery-head reveal">
    <span class="kicker">001 — 012</span>
  </div>

  <div class="grid">
    <figure class="frame reveal" style="--hue:18;">
      <div class="frame-glow"></div>
      <div class="frame-body">
        <img src="images/pic1.jpg" alt="golden hour, rooftop" class="frame-img">
        <span class="frame-num">01</span>
      </div>
    </figure>

    <figure class="frame reveal" style="--hue:28;">
      <div class="frame-glow"></div>
      <div class="frame-body">
        <img src="images/pic2.jpg" alt="night drive, city lights" class="frame-img">
        <span class="frame-num">02</span>
      </div>
    </figure>

    <figure class="frame reveal" style="--hue:14;">
      <div class="frame-glow"></div>
      <div class="frame-body">
        <img src="images/pic3.jpg" alt="campfire, low fog" class="frame-img">
        <span class="frame-num">03</span>
      </div>
    </figure>

    <figure class="frame reveal" style="--hue:22;">
      <div class="frame-glow"></div>
      <div class="frame-body">
        <img src="images/pic4.jpg" alt="desert, last light" class="frame-img">
        <span class="frame-num">04</span>
      </div>
    </figure>

    <figure class="frame reveal" style="--hue:10;">
      <div class="frame-glow"></div>
      <div class="frame-body">
        <img src="images/pic5.jpg" alt="street, neon rain" class="frame-img">
        <span class="frame-num">05</span>
      </div>
    </figure>

    <figure class="frame reveal" style="--hue:32;">
      <div class="frame-glow"></div>
      <div class="frame-body">
        <img src="images/pic6.jpg" alt="sunrise, open road" class="frame-img">
        <span class="frame-num">06</span>
      </div>
    </figure>

    <figure class="frame reveal" style="--hue:18;">
      <div class="frame-glow"></div>
      <div class="frame-body">
        <img src="images/pic7.jpg" alt="misty mountains" class="frame-img">
        <span class="frame-num">07</span>
      </div>
    </figure>

    <figure class="frame reveal" style="--hue:25;">
      <div class="frame-glow"></div>
      <div class="frame-body">
        <img src="images/pic8.jpg" alt="ocean waves" class="frame-img">
        <span class="frame-num">08</span>
      </div>
    </figure>

    <figure class="frame reveal" style="--hue:15;">
      <div class="frame-glow"></div>
      <div class="frame-body">
        <img src="images/pic9.jpg" alt="forest paths" class="frame-img">
        <span class="frame-num">09</span>
      </div>
    </figure>

    <figure class="frame reveal" style="--hue:5;">
      <div class="frame-glow"></div>
      <div class="frame-body">
        <img src="images/pic10.jpg" alt="city rainy day" class="frame-img">
        <span class="frame-num">10</span>
      </div>
    </figure>

    <figure class="frame reveal" style="--hue:20;">
      <div class="frame-glow"></div>
      <div class="frame-body">
        <img src="images/pic11.jpg" alt="starry night sky" class="frame-img">
        <span class="frame-num">11</span>
      </div>
    </figure>

    <figure class="frame reveal" style="--hue:30;">
      <div class="frame-glow"></div>
      <div class="frame-body">
        <img src="images/pic12.jpg" alt="golden sunset fields" class="frame-img">
        <span class="frame-num">12</span>
      </div>
    </figure>
  </div>
</section>
  </main>

  <footer class="closing">
    <div class="closing-glow"></div>
    <p class="closing-eyebrow reveal">— the reel ends, the light stays —</p>
    <h2 class="closing-title reveal">Best moments I've captured</h2>
  </footer>

  <script src="script.js"></script>
</body>
</html>
